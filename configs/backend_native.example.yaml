seed: 13
algorithm: PDHG
problem_family: miplib_rootlp

# Native solver baselines are enabled automatically when backends are present.
# Typical installs:
#   python3 -m pip install highspy osqp ortools
#   python3 -m pip install pyscipopt
#   python3 -m pip install ecole
#
# After installation, run the normal baseline command:
#   PYTHONPATH=src python3 -m llm4unroll.experiments.run_baselines --config configs/backend_native.example.yaml
#
# The output table will show backend_mode=native when a real backend is used.

dataset:
  list_path: data/miplib/miplib_small.txt
  benchmark_group: miplib_small

budget:
  max_iters: 80
  time_limit_s: 10.0

evaluation:
  train_instances: 3
  validation_instances: 2
  test_instances: 2

llm:
  provider: mock
